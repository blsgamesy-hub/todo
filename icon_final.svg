<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fdf9f0"/>
      <stop offset="100%" stop-color="#e8dfd0"/>
    </radialGradient>
    <!-- 4방위 파스텔 그라데이션 -->
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8c4a0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b8d4c8" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="bottom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4c0e0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f0d0d0" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="corner-tl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c4a0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fdf9f0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="corner-tr" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b8d4c8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fdf9f0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="corner-bl" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4c0e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fdf9f0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="corner-br" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f0d0d0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fdf9f0" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#5a4a3a" flood-opacity="0.25"/>
    </filter>
    <filter id="pencil-shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#5a4a3a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 4방위 파스텔 코너 그라데이션 -->
  <rect width="512" height="512" rx="100" fill="url(#corner-tl)"/>
  <rect width="512" height="512" rx="100" fill="url(#corner-tr)"/>
  <rect width="512" height="512" rx="100" fill="url(#corner-bl)"/>
  <rect width="512" height="512" rx="100" fill="url(#corner-br)"/>

  <!-- 약간 눕힌 노트 -->
  <g transform="translate(256,265) rotate(-8)" filter="url(#shadow)">
    <rect x="-155" y="-140" width="310" height="260" rx="16" fill="#fdf9f0" stroke="#e0d0b8" stroke-width="5"/>
    <!-- 노트 줄 -->
    <line x1="-120" y1="-60" x2="120" y2="-60" stroke="#e8dfd0" stroke-width="7" stroke-linecap="round"/>
    <line x1="-120" y1="-10" x2="120" y2="-10" stroke="#e8dfd0" stroke-width="7" stroke-linecap="round"/>
    <line x1="-120" y1="40" x2="80" y2="40" stroke="#e8dfd0" stroke-width="7" stroke-linecap="round"/>
    <!-- 왼쪽 여백선 -->
    <line x1="-95" y1="-130" x2="-95" y2="110" stroke="#f0b8b8" stroke-width="4" opacity="0.6"/>
    <!-- 체크 두 개 -->
    <circle cx="-115" cy="-60" r="11" fill="#b8d4c8"/>
    <polyline points="-121,-60 -115,-54 -103,-68" stroke="#2a5a48" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-115" cy="-10" r="11" fill="#b8d4c8"/>
    <polyline points="-121,-10 -115,-4 -103,-18" stroke="#2a5a48" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-115" cy="40" r="11" fill="none" stroke="#d0c0a8" stroke-width="4"/>
  </g>

  <!-- 연필 (노트 위에, 살짝 다른 각도) -->
  <g transform="translate(310,170) rotate(38)" filter="url(#pencil-shadow)">
    <!-- 연필 몸통 -->
    <rect x="-14" y="-95" width="28" height="140" rx="5" fill="#5a4a3a"/>
    <!-- 연필 끝 (나무) -->
    <rect x="-14" y="45" width="28" height="22" fill="#e8c4a0"/>
    <!-- 연필 심 -->
    <polygon points="-14,67 14,67 0,100" fill="#e8c4a0"/>
    <polygon points="-6,67 6,67 0,88" fill="#9a8070"/>
    <!-- 지우개 -->
    <rect x="-14" y="-95" width="28" height="22" rx="5" fill="#f0d0d0"/>
    <!-- 지우개 테두리 -->
    <rect x="-14" y="-76" width="28" height="6" fill="#c8a882"/>
    <!-- 연필 줄무늬 -->
    <line x1="-14" y1="-20" x2="14" y2="-20" stroke="#4a3a2a" stroke-width="2" opacity="0.3"/>
    <line x1="-14" y1="10" x2="14" y2="10" stroke="#4a3a2a" stroke-width="2" opacity="0.3"/>
  </g>
</svg>
